    <meta name="theme-color" content="#0a0b12" />
    <script>
      // Apply theme before paint to avoid a flash (mirrors store initialTheme).
      (function () {
        try {
          var s = localStorage.getItem('whirlfolio-theme')
          var dark = s ? s === 'dark' : !window.matchMedia('(prefers-color-scheme: light)').matches
          if (dark) document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light'
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
